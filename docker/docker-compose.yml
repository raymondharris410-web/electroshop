version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: electro_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=electro_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5402:5432"

  redis:
    image: redis:7-alpine
    container_name: electro_redis
    ports:
      - "6379:6379"

  web:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: electro_web
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 electro_shop.wsgi:application
    volumes:
      - ../:/app
    environment:
      - SECRET_KEY=production-secret-key-change-it-django-5
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DB_NAME=electro_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: electro_celery
    command: celery -A electro_shop worker --loglevel=info
    volumes:
      - ../:/app
    environment:
      - SECRET_KEY=production-secret-key-change-it-django-5
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DB_NAME=electro_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - db

  nginx:
    image: nginx:1.25-alpine
    container_name: electro_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../staticfiles:/app/staticfiles
      - ../media:/app/media
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
