{% extends 'base.html' %}
{% block title %}Kata Sandi Diubah | ElectroShop{% endblock %}

{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 p-4 text-center" style="border-radius: 16px;">
        <div class="card-body">
          <i class="bi bi-shield-check text-success fs-1 mb-3"></i>
          <h3 class="card-title fw-bold mb-3">Kata Sandi Berhasil Diatur Ulang</h3>
          <p class="text-muted small mb-4">Kata sandi baru Anda telah berhasil disimpan. Anda sekarang dapat masuk menggunakan kata sandi yang baru.</p>
          <a href="{% url 'login' %}" class="btn btn-primary-custom w-100 py-2.5 fw-bold">Masuk Sekarang</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
